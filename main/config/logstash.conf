# Logstash Pipeline – AutoSec AI
# Accepts syslog / JSON logs, enriches them, forwards to Elasticsearch

input {
  tcp {
    port => 5000
    codec => json
  }
  udp {
    port => 5000
    codec => json
  }
  beats {
    port => 5044
  }
}

filter {
  # Parse timestamp
  date {
    match => ["timestamp", "ISO8601"]
    target => "@timestamp"
  }

  # Geolocate source IP (requires GeoIP DB)
  # geoip { source => "source_ip" }

  # Tag high-severity events
  if [severity] and [severity] >= 7 {
    mutate { add_tag => ["high_severity"] }
  }

  # Tag known attack event types
  if [event_type] in ["brute_force", "data_exfil", "malware", "privilege_escalation"] {
    mutate { add_tag => ["attack_pattern"] }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "autosec-logs-%{+YYYY.MM.dd}"
  }

  # Also forward to AutoSec backend for ML processing
  http {
    url => "http://backend:8000/ingest"
    http_method => "post"
    format => "json"
    mapping => {
      "source_ip" => "%{source_ip}"
      "event_type" => "%{event_type}"
      "severity"   => "%{severity}"
      "user"       => "%{user}"
    }
  }
}
